services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    container_name: LibreChat-API
    depends_on:
      - mongodb
      - rag_api
      - sap-docs-mcp
      - vsp-mcp
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
    networks:
      - dokploy-network
      - default

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.17
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.12.3
    restart: always
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.12:/meili_data

  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data

  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

  sap-docs-mcp:
    container_name: sap-docs-mcp
    build:
      context: ./docker/sap-docs-mcp
      args:
        - SAP_DOCS_OFFLINE_MODE=${SAP_DOCS_OFFLINE_MODE:-true}
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3122
      - MCP_INCLUDE_ONLINE_DEFAULT=false
    restart: unless-stopped
    ports:
      - 3124:3122

  vsp-mcp:
    container_name: vsp-mcp
    build:
      context: ./docker/vsp-mcp
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - SAP_URL=${SAP_URL}
      - SAP_USER=${SAP_TECH_USER}
      - SAP_PASSWORD=${SAP_TECH_PASSWORD}
      - SAP_CLIENT=${SAP_CLIENT}
      - SAP_INSECURE=${SAP_INSECURE}
      - MCP_PROXY_PORT=3000
      - VSP_MODE=focused
      - SAP_READ_ONLY=true
      - VSP_EXTRA_ARGS=--block-free-sql --transport-read-only --disabled-groups debugger
    volumes:
      - ./wg/wg0.conf:/etc/wireguard/wg0.conf:ro
    restart: unless-stopped
    ports:
      - 3130:3000

volumes:
  pgdata2:

networks:
  dokploy-network:
    external: true
