version: 1.3.3
cache: true

interface:
  agents:
    use: true
    create: true
    share: false
    public: false
  mcpServers:
    use: true
    create: true
    share: false
    public: false

registration:
  socialLogins: ['openid']

mcpSettings:
  # Allow internal Docker MCP servers (SSRF protection is strict when configured)
  allowedDomains:
    - 'sap-docs-mcp'
    - 'vsp-mcp'
    - 'sap'
    - 'docs'

mcpServers:
  docs:
    type: streamable-http
    url: 'http://sap-docs-mcp:3122/mcp'
    chatMenu: true
    startup: false

  sap:
    type: streamable-http
    url: 'http://vsp-mcp:3000/mcp'
    chatMenu: true
    startup: false


fileConfig:
  serverFileSizeLimit: 25

endpoints:
  # Only Ollama is exposed by default. ENDPOINTS=custom in .env hides all
  # cloud providers (OpenAI, Anthropic, etc.). See docs/GUIDE.md §7 to add more.
  custom:
    - name: "Ollama"
      apiKey: "ollama"
      # host.docker.internal resolves to the Mac host — works when Ollama runs natively.
      # If Ollama runs in Docker instead, change to: http://ollama:11434/v1
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        # fetch: true — LibreChat queries Ollama at startup and shows only
        # models that are actually pulled. Set fetch: false and list specific
        # model names here to restrict which models users can choose from.
        fetch: true
        default: ["llama3.1:70b"]
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Ollama"
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default: ["llama-3.3-70b-versatile", "llama-3.1-8b-instant", "mixtral-8x7b-32768"]
        fetch: true
      dropInvalidParams: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Groq"
      promptPrefix: "CRITICAL INSTRUCTION FOR TOOL CALLS: 1) JSON Types: If a parameter is a number, output it as a raw JSON number (e.g. 10), NEVER a string. 2) String Validation: Never pass 'null' for string parameters; use an empty string (\"\") instead. 3) Tool Names: Use the EXACT tool names provided in the tool list (e.g. including the _mcp_ suffix). Failure to follow these rules will crash the system."
  agents:
    disableBuilder: false
