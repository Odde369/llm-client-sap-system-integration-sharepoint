version: 1.3.3
cache: true

interface:
  agents:
    use: true
    create: true
    share: false
    public: false
  mcpServers:
    use: true
    create: true
    share: false
    public: false

registration:
  socialLogins: ["openid"]

mcpSettings:
  # Allow internal Docker MCP servers (SSRF protection is strict when configured)
  allowedDomains:
    - "sap-docs-mcp"
    - "vsp-mcp"
    # - "sap-mcp-proxy"
    - "sap"
    - "docs"
    - "btp-mcp"
    - "ui5-mcp"
    - "fiori-mcp"
    - "cap-mcp"

mcpServers:
  docs:
    type: streamable-http
    url: "http://sap-docs-mcp:3122/mcp"
    chatMenu: true
    startup: false
    timeout: 3600000

  sap:
    type: streamable-http
    url: "http://vsp-mcp:3000/mcp"
    chatMenu: true
    startup: false
    timeout: 3600000

  # sap-multi:
  #   type: streamable-http
  #   url: "http://sap-mcp-proxy:3000/mcp"
  #   title: "SAP Multi System"
  #   description: "Dynamic SAP system access — supports multiple S/4HANA systems. Use sap_list_systems to see available systems, then sap_execute to run tools."
  #   chatMenu: true
  #   startup: false
  #   timeout: 3600000

  ui5-mcp:
    type: streamable-http
    url: "http://ui5-mcp:3210/mcp"
    title: "SAPUI5"
    description: "UI5 API-Referenz, Linter-Guidelines, TypeScript-Migration, Integration Cards, Manifest-Validierung"
    chatMenu: true
    startup: false
    timeout: 3600000

  fiori-mcp:
    type: streamable-http
    url: "http://fiori-mcp:3211/mcp"
    title: "SAP Fiori"
    description: "Fiori Elements Dokumentation, App-Generierung für CAP/OData, Seitenmanagement, Annotations"
    chatMenu: true
    startup: false
    timeout: 3600000

  cap-mcp:
    type: streamable-http
    url: "http://cap-mcp:3212/mcp"
    title: "SAP CAP"
    description: "CDS-Modell-Suche (Entities, Services, Annotations, Endpoints), CAP Framework Dokumentation"
    chatMenu: true
    startup: false
    timeout: 3600000

  btp-mcp:
    type: streamable-http
    url: http://btp-mcp:4004/mcp
    title: "SAP BTP Management"
    description: "SAP BTP Landscape: Global Account, Subaccounts, Directories, Entitlements, SaaS Subscriptions, Service Instances & Bindings, Cloud Foundry Orgs/Spaces/Apps/Routes/Processes/Env, Events"
    chatMenu: true
    startup: false
    timeout: 3600000

fileConfig:
  serverFileSizeLimit: 25

endpoints:
  # Only Ollama is exposed by default. ENDPOINTS=custom in .env hides all
  # cloud providers (OpenAI, Anthropic, etc.). See docs/GUIDE.md §7 to add more.
  custom:
    - name: "Ollama"
      apiKey: "ollama"
      # host.docker.internal resolves to the Mac host — works when Ollama runs natively.
      # If Ollama runs in Docker instead, change to: http://ollama:11434/v1
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        # fetch: true — LibreChat queries Ollama at startup and shows only
        # models that are actually pulled. Set fetch: false and list specific
        # model names here to restrict which models users can choose from.
        fetch: true
        default: ["llama3.1:70b"]
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Ollama"
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          [
            "llama-3.3-70b-versatile",
            "llama-3.1-8b-instant",
            "mixtral-8x7b-32768",
          ]
        fetch: true
      dropInvalidParams: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Groq"
      promptPrefix: 'CRITICAL INSTRUCTION FOR TOOL CALLS: 1) JSON Types: If a parameter is a number, output it as a raw JSON number (e.g. 10), NEVER a string. 2) String Validation: Never pass ''null'' for string parameters; use an empty string ("") instead. 3) Tool Names: Use the EXACT tool names provided in the tool list (e.g. including the _mcp_ suffix). Failure to follow these rules will crash the system.'
    - name: "Ollama Cloud"
      apiKey: "${OLLAMA_CLOUD_API_KEY}"
      # Routes through ollama-proxy which normalizes text-format tool calls
      # (DeepSeek sometimes returns tool calls as plain text instead of tool_calls).
      # The proxy forwards all headers (incl. Authorization) transparently to Ollama Cloud.
      baseURL: "http://ollama-proxy:4010/v1"
      models:
        # fetch: true erst aktivieren, wenn OLLAMA_CLOUD_API_KEY gesetzt ist
        fetch: false
        default: ["qwen3.5:397b", "gpt-oss:120b", "deepseek-v3.1:671b-cloud"]
      dropInvalidParams: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Ollama Cloud"
      addParams:
        tool_choice: "auto"
        parallel_tool_calls: false
  agents:
    disableBuilder: false
    recursionLimit: 100
    maxRecursionLimit: 200
